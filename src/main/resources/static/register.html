<!DOCTYPE html>
<html lang="en">
<head>
    <title>Register</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 80px auto; padding: 20px; }
        input { display: block; width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .msg { padding: 8px; border-radius: 4px; margin-bottom: 10px; }
        .error { background: #ffe0e0; color: #c00; }
    </style>
</head>
<body>
<h2>Register</h2>
<div id="msg" class="msg" style="display:none"></div>
<input type="text" id="name" placeholder="Full Name" />
<input type="email" id="email" placeholder="Email" />
<input type="password" id="password" placeholder="Password (min 6 chars)" />
<button onclick="register()">Register</button>
<p>Have an account? <a href="/login.html">Login</a></p>

<script>
    async function register() {
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        try {
            const res = await fetch('/api/v1/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.message);
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data));
            window.location.href = '/dashboard.html';
        } catch (e) {
            const msg = document.getElementById('msg');
            msg.style.display = 'block';
            msg.className = 'msg error';
            msg.textContent = e.message;
        }
    }
</script>
</body>
</html>
