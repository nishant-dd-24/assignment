<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Assignment API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f6f8fa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 360px;
        }
        h1 {
            margin-bottom: 10px;
        }
        p {
            color: #555;
            margin-bottom: 25px;
        }
        .btn {
            display: block;
            margin: 10px 0;
            padding: 12px;
            border-radius: 6px;
            text-decoration: none;
            color: white;
            font-weight: bold;
        }
        .login { background: #007bff; }
        .register { background: #28a745; }
        .docs { background: #6c757d; }
        .btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
<div class="card">
    <h1>Assignment API</h1>
    <p>Task management system with authentication and role-based access.</p>

    <a class="btn login" href="/login.html">Login</a>
    <a class="btn register" href="/register.html">Register</a>
    <a class="btn docs" href="/swagger-ui/index.html">API Docs</a>
</div>
</body>
</html>
